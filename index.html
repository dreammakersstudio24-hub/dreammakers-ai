<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Dream Makers Studio AI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin-top:100px;
}

input{
display:block;
margin:10px auto;
padding:10px;
width:260px;
}

button{
padding:10px 20px;
margin:10px;
background:#6366f1;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

img{
margin-top:20px;
max-width:300px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>Dream Makers Studio AI</h1>
<h3>Signup / Login Test</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<p id="msg"></p>


<hr style="margin:40px;">


<h2>Upload Room Photo</h2>

<input
type="file"
id="photoInput"
accept="image/*"
capture="environment"
/>

<button onclick="uploadPhoto()">Upload Photo</button>

<p id="status"></p>

<img id="preview">
<h3>Choose Style</h3>

<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:10px;max-width:500px;margin:auto">

<div onclick="selectStyle('minimal')" style="background:#1e293b;padding:15px;border-radius:8px;width:120px;cursor:pointer">
Minimal
</div>

<div onclick="selectStyle('scandinavian')" style="background:#1e293b;padding:15px;border-radius:8px;width:120px;cursor:pointer">
Scandinavian
</div>

<div onclick="selectStyle('luxury')" style="background:#1e293b;padding:15px;border-radius:8px;width:120px;cursor:pointer">
Luxury
</div>

<div onclick="selectStyle('modern')" style="background:#1e293b;padding:15px;border-radius:8px;width:120px;cursor:pointer">
Modern
</div>

<div onclick="selectStyle('japandi')" style="background:#1e293b;padding:15px;border-radius:8px;width:120px;cursor:pointer">
Japandi
</div>

</div>

<p id="styleStatus"></p>

<button onclick="generateAI()" style="margin-top:20px">
Generate AI Design
</button>

<p id="aiStatus"></p>

<img id="aiResult" style="max-width:300px;margin-top:20px;border-radius:10px">  

<script>

const url = "https://etccavrpchbtcpeegtbu.supabase.co"
const key = "sb_publishable_b_WO8d4duWJ7tATcBIceRg_TbzF-2-N"

const client = supabase.createClient(url,key)


async function signup(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const {error} = await client.auth.signUp({
email:email,
password:password
})

if(error){
msg.innerText = error.message
}else{
msg.innerText = "Signup success"
}

}


async function login(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const {error} = await client.auth.signInWithPassword({
email:email,
password:password
})

if(error){
msg.innerText = error.message
}else{
msg.innerText = "Login success"
}

}


// preview image

const input = document.getElementById("photoInput")
const preview = document.getElementById("preview")

input.addEventListener("change", () => {

const file = input.files[0]

if(!file) return

const reader = new FileReader()

reader.onload = function(e){
preview.src = e.target.result
}

reader.readAsDataURL(file)

})

async function uploadPhoto(){

const file = document.getElementById("photoInput").files[0]

if(selectedStyle === ""){
alert("Please select a style first")
return
}  

if(!file){
alert("Please choose a photo")
return
}

document.getElementById("status").innerText = "Uploading..."

const user = await client.auth.getUser()

const userId = user.data.user.id

const filePath = userId + "/" + Date.now() + ".jpg"

const { error } = await client.storage
.from("room-images")
.upload(filePath,file)

if(error){

document.getElementById("status").innerText="Upload failed"
console.log(error)

}else{

document.getElementById("status").innerText="Upload success"

const { data } = client
.storage
.from("room-images")
.getPublicUrl(filePath)

window.uploadedImageUrl = data.publicUrl
  
preview.src = data.publicUrl

}

}  
let selectedStyle = ""

function selectStyle(style){

selectedStyle = style

document.getElementById("styleStatus").innerText =
"Selected style: " + style

}
async function generateAI(){

if(selectedStyle === ""){
alert("Please select a style first")
return
}

if(!window.uploadedImageUrl){
alert("Please upload a photo first")
return
}

document.getElementById("aiStatus").innerText =
"Generating AI design..."

const response = await fetch("/api/generate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
image:window.uploadedImageUrl,
style:selectedStyle
})
})

const data = await response.json()
console.log(data)

const imageUrl = data.output[0]

const img = document.createElement("img")
img.src = imageUrl
img.style.width = "300px"
img.style.marginTop = "20px"

document.body.appendChild(img)

document.getElementById("aiStatus").innerText =
"AI request sent. Rendering may take ~20 seconds."

}
</script>

</body>
</html>
