<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Dream Makers Studio AI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin-top:100px;
}

input{
display:block;
margin:10px auto;
padding:10px;
width:260px;
}

button{
padding:10px 20px;
margin:10px;
background:#6366f1;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>

</head>

<body>

<h1>Dream Makers Studio AI</h1>
<h3>Signup / Login Test</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button> <button onclick="login()">Login</button>

<p id="msg"></p>

<script>

const url = "https://etccavrpbchbtcpeegtbu.supabase.co"
const key = "sb_publishable_b_WO8d4duWJ7tATcBIceRg_TbzF-2-N"

const client = supabase.createClient(url,key)

async function signup(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const {error} = await client.auth.signUp({
email:email,
password:password
})

if(error){
msg.innerText = error.message
}else{
msg.innerText = "Signup success"
}

}

async function login(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const {error} = await client.auth.signInWithPassword({
email:email,
password:password
})

if(error){
msg.innerText = error.message
}else{
msg.innerText = "Login success"
}

}

</script>

</body>
</html>
