<!DOCTYPE html>

<html>

<head>
<meta charset="UTF-8">
<title>Dream Makers Studio AI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin-top:100px;
}

input{
display:block;
margin:10px auto;
padding:10px;
width:260px;
}

button{
padding:10px 20px;
margin:10px;
background:#6366f1;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

img{
margin-top:20px;
max-width:300px;
border-radius:10px;
}

.styleBox{
background:#1e293b;
padding:15px;
border-radius:8px;
width:120px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Dream Makers Studio AI</h1>
<h3>Signup / Login Test</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button> <button onclick="login()">Login</button>

<p id="msg"></p>

<hr style="margin:40px;">

<h2>Upload Room Photo</h2>

<input
type="file"
id="photoInput"
accept="image/*"
capture="environment"
/>

<button onclick="uploadPhoto()">Upload Photo</button>

<p id="status"></p>

<img id="preview">

<h3>Choose Style</h3>

<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:10px;max-width:500px;margin:auto">

<div class="styleBox" onclick="selectStyle('minimal')">Minimal</div>
<div class="styleBox" onclick="selectStyle('scandinavian')">Scandinavian</div>
<div class="styleBox" onclick="selectStyle('luxury')">Luxury</div>
<div class="styleBox" onclick="selectStyle('modern')">Modern</div>
<div class="styleBox" onclick="selectStyle('japandi')">Japandi</div>

</div>

<p id="styleStatus"></p>

<button onclick="generateAI()" style="margin-top:20px">
Generate AI Design
</button>

<p id="aiStatus"></p>

<img id="aiResult">

<script>

const url = "https://etccavrpchbtcpeegtbu.supabase.co"
const key = "sb_publishable_b_WO8d4duWJ7tATcBIceRg_TbzF-2-N"

const client = supabase.createClient(url,key)

let selectedStyle = ""

async function signup(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const {error} = await client.auth.signUp({
email:email,
password:password
})

if(error){
msg.innerText = error.message
}else{
msg.innerText = "Signup success"
}

}

async function login(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const {error} = await client.auth.signInWithPassword({
email:email,
password:password
})

if(error){
msg.innerText = error.message
}else{
msg.innerText = "Login success"
}

}

// preview image

const input = document.getElementById("photoInput")
const preview = document.getElementById("preview")

input.addEventListener("change", () => {

const file = input.files[0]
if(!file) return

const reader = new FileReader()

reader.onload = function(e){
preview.src = e.target.result
}

reader.readAsDataURL(file)

})

// upload image

async function uploadPhoto(){

const file = document.getElementById("photoInput").files[0]

if(!file){
alert("Please choose a photo")
return
}

document.getElementById("status").innerText = "Uploading..."

const user = await client.auth.getUser()

if(!user.data.user){
alert("Please login first")
return
}

const userId = user.data.user.id

const filePath = userId + "/" + Date.now() + ".jpg"

const { error } = await client.storage
.from("room-images")
.upload(filePath,file)

if(error){

document.getElementById("status").innerText="Upload failed"
console.log(error)

}else{

document.getElementById("status").innerText="Upload success"

const { data } = client
.storage
.from("room-images")
.getPublicUrl(filePath)

window.uploadedImageUrl = data.publicUrl

preview.src = data.publicUrl

}

}

function selectStyle(style){

selectedStyle = style

document.getElementById("styleStatus").innerText =
"Selected style: " + style

}

async function generateAI(){

if(selectedStyle === ""){
alert("Please select a style first")
return
}

if(!window.uploadedImageUrl){
alert("Please upload a photo first")
return
}

document.getElementById("aiStatus").innerText =
"Generating AI design..."

const response = await fetch("/api/generate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
image:window.uploadedImageUrl,
style:selectedStyle
})
})

const data = await response.json()
console.log("AI RESPONSE:",data)

let imageUrl = null

if(data.output){

if(Array.isArray(data.output)){
imageUrl = data.output[0]
}else{
imageUrl = data.output
}

}

if(!imageUrl && data.urls && data.urls.get){
imageUrl = data.urls.get
}

if(!imageUrl){
document.getElementById("aiStatus").innerText =
"AI finished but no image URL returned"
return
}

document.getElementById("aiResult").src = imageUrl

document.getElementById("aiStatus").innerText =
"AI design generated!"

}


</script>

</body>
</html>
