<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Dream Makers Studio AI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin-top:100px;
}

input{
display:block;
margin:10px auto;
padding:10px;
width:260px;
}

button{
padding:10px 20px;
margin:10px;
background:#6366f1;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

img{
margin-top:20px;
max-width:300px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>Dream Makers Studio AI</h1>
<h3>Signup / Login Test</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<p id="msg"></p>


<hr style="margin:40px;">


<h2>Upload Room Photo</h2>

<input
type="file"
id="photoInput"
accept="image/*"
capture="environment"
/>

<button onclick="uploadPhoto()">Upload Photo</button>

<p id="status"></p>

<img id="preview">


<script>

const url = "https://etccavrpchbtcpeegtbu.supabase.co"
const key = "sb_publishable_b_WO8d4duWJ7tATcBIceRg_TbzF-2-N"

const client = supabase.createClient(url,key)


async function signup(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const {error} = await client.auth.signUp({
email:email,
password:password
})

if(error){
msg.innerText = error.message
}else{
msg.innerText = "Signup success"
}

}


async function login(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const {error} = await client.auth.signInWithPassword({
email:email,
password:password
})

if(error){
msg.innerText = error.message
}else{
msg.innerText = "Login success"
}

}


// preview image

const input = document.getElementById("photoInput")
const preview = document.getElementById("preview")

input.addEventListener("change", () => {

const file = input.files[0]

if(!file) return

const reader = new FileReader()

reader.onload = function(e){
preview.src = e.target.result
}

reader.readAsDataURL(file)

})

async function uploadPhoto(){

const file = document.getElementById("photoInput").files[0]

if(!file){
alert("Please choose a photo")
return
}

document.getElementById("status").innerText = "Uploading..."

const user = await client.auth.getUser()

const userId = user.data.user.id

const filePath = userId + "/" + Date.now() + ".jpg"

const { error } = await client.storage
.from("room-images")
.upload(filePath,file)

if(error){

document.getElementById("status").innerText="Upload failed"
console.log(error)

}else{

document.getElementById("status").innerText="Upload success"

}

}  
</script>

</body>
</html>
