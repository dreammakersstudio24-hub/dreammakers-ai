<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dream Makers Studio AI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin-top:100px;
}

input{
display:block;
margin:10px auto;
padding:10px;
width:260px;
border-radius:6px;
border:none;
}

button{
padding:10px 20px;
margin:10px;
background:#6366f1;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

#msg{
margin-top:20px;
color:#cbd5f5;
}

</style>

</head>

<body>

<h1>Dream Makers Studio AI</h1>
<h3>Signup / Login Test</h3>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="signUp()">Sign Up</button>

<button onclick="login()">Login</button>

<p id="msg"></p>

<script>

const supabaseUrl = "https://etccavrpbchbtcpeegtbu.supabase.co"

const supabaseKey = "sb_publishable_b_WO8d4duWJ7tATcBIceRg_TbzF-2-N"

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

async function signUp(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const { data, error } = await supabase.auth.signUp({
email: email,
password: password
})

if(error){
document.getElementById("msg").innerText = error.message
}
else{
document.getElementById("msg").innerText = "Signup success! Check your email."
}

}

async function login(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const { data, error } = await supabase.auth.signInWithPassword({
email: email,
password: password
})

if(error){
document.getElementById("msg").innerText = error.message
}
else{
document.getElementById("msg").innerText = "Login success!"
}

}

</script>

</body>
</html>
